<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#303f9f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 야간 쇼핑몰 -->
  <rect x="30" y="100" width="340" height="150" fill="#1c2331"/>
  <!-- 네온 간판 테두리 -->
  <rect x="30" y="100" width="340" height="6" fill="#ff1744"/>
  <rect x="30" y="244" width="340" height="6" fill="#ff1744"/>
  <rect x="30" y="100" width="6" height="150" fill="#ff1744"/>
  <rect x="364" y="100" width="6" height="150" fill="#ff1744"/>
  <!-- 중앙 간판 -->
  <rect x="120" y="112" width="160" height="35" rx="4" fill="#000"/>
  <text x="200" y="136" font-family="sans-serif" font-size="18" fill="#ff1744" text-anchor="middle" font-weight="bold">MEGA MALL</text>
  <!-- 빛나는 글자 효과 -->
  <text x="200" y="136" font-family="sans-serif" font-size="18" fill="#ff6090" text-anchor="middle" font-weight="bold" opacity="0.4">MEGA MALL</text>
  <!-- 쇼윈도 -->
  <rect x="45" y="155" width="65" height="55" rx="2" fill="#0d1b2a"/>
  <rect x="48" y="158" width="59" height="49" fill="#1a2a3f"/>
  <text x="77" y="190" font-family="sans-serif" font-size="22" text-anchor="middle">👗</text>
  <rect x="125" y="155" width="65" height="55" rx="2" fill="#0d1b2a"/>
  <rect x="128" y="158" width="59" height="49" fill="#1a2a3f"/>
  <text x="157" y="190" font-family="sans-serif" font-size="22" text-anchor="middle">📱</text>
  <rect x="205" y="155" width="65" height="55" rx="2" fill="#0d1b2a"/>
  <rect x="208" y="158" width="59" height="49" fill="#1a2a3f"/>
  <text x="237" y="190" font-family="sans-serif" font-size="22" text-anchor="middle">👟</text>
  <rect x="285" y="155" width="65" height="55" rx="2" fill="#0d1b2a"/>
  <rect x="288" y="158" width="59" height="49" fill="#1a2a3f"/>
  <text x="317" y="190" font-family="sans-serif" font-size="22" text-anchor="middle">💎</text>
  <!-- 주차장 (쓰레기 넘침) -->
  <rect x="0" y="250" width="400" height="30" fill="#263238"/>
  <rect x="15" y="253" width="22" height="14" rx="3" fill="#37474f"/>
  <rect x="50" y="253" width="22" height="14" rx="3" fill="#455a64"/>
  <rect x="85" y="253" width="22" height="14" rx="3" fill="#37474f"/>
  <rect x="120" y="253" width="22" height="14" rx="3" fill="#455a64"/>
  <!-- 쓰레기 -->
  <circle cx="160" cy="260" r="4" fill="#8d6e63" opacity="0.8"/>
  <circle cx="175" cy="257" r="3" fill="#795548" opacity="0.8"/>
  <circle cx="250" cy="260" r="4" fill="#6d4c41" opacity="0.8"/>
  <!-- 네온 반사 -->
  <rect x="0" y="248" width="400" height="3" fill="#ff1744" opacity="0.3"/>
  <!-- 텍스트 -->
  <text x="200" y="22" font-family="sans-serif" font-size="13" fill="#ff80ab" text-anchor="middle" font-weight="bold">화려한 밤, 넘치는 쓰레기</text>
  <text x="200" y="38" font-family="sans-serif" font-size="10" fill="#f48fb1" text-anchor="middle">소비의 시대, 마을은 점점 더러워집니다</text>
</svg>
