<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
    <linearGradient id="smog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90a4ae" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b0bec5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 하늘 -->
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 스모그 레이어 -->
  <ellipse cx="200" cy="80" rx="220" ry="60" fill="url(#smog)"/>
  <!-- 배경 건물들 -->
  <rect x="10" y="100" width="50" height="130" fill="#78909c"/>
  <rect x="20" y="80" width="30" height="150" fill="#607d8b"/>
  <rect x="60" y="90" width="45" height="140" fill="#546e7a"/>
  <!-- 중간 건물들 -->
  <rect x="100" y="60" width="60" height="170" fill="#455a64"/>
  <rect x="155" y="40" width="55" height="190" fill="#37474f"/>
  <rect x="205" y="55" width="65" height="175" fill="#455a64"/>
  <rect x="265" y="70" width="50" height="160" fill="#546e7a"/>
  <rect x="310" y="50" width="60" height="180" fill="#37474f"/>
  <rect x="365" y="85" width="40" height="145" fill="#607d8b"/>
  <!-- 창문들 -->
  <g fill="#b0bec5" opacity="0.5">
    <rect x="108" y="70" width="8" height="8"/>
    <rect x="120" y="70" width="8" height="8"/>
    <rect x="132" y="70" width="8" height="8"/>
    <rect x="108" y="85" width="8" height="8"/>
    <rect x="120" y="85" width="8" height="8"/>
    <rect x="132" y="85" width="8" height="8"/>
    <rect x="163" y="50" width="8" height="8"/>
    <rect x="175" y="50" width="8" height="8"/>
    <rect x="163" y="65" width="8" height="8"/>
    <rect x="175" y="65" width="8" height="8"/>
  </g>
  <g fill="#fff176" opacity="0.6">
    <rect x="108" y="100" width="8" height="8"/>
    <rect x="132" y="100" width="8" height="8"/>
    <rect x="175" y="80" width="8" height="8"/>
    <rect x="213" y="70" width="8" height="8"/>
    <rect x="225" y="70" width="8" height="8"/>
  </g>
  <!-- 땅 / 도로 -->
  <rect x="0" y="230" width="400" height="50" fill="#455a64"/>
  <rect x="0" y="235" width="400" height="4" fill="#546e7a"/>
  <!-- 도로 중앙선 -->
  <rect x="0" y="254" width="60" height="3" fill="#ffd54f" opacity="0.7"/>
  <rect x="80" y="254" width="60" height="3" fill="#ffd54f" opacity="0.7"/>
  <rect x="160" y="254" width="60" height="3" fill="#ffd54f" opacity="0.7"/>
  <rect x="240" y="254" width="60" height="3" fill="#ffd54f" opacity="0.7"/>
  <rect x="320" y="254" width="60" height="3" fill="#ffd54f" opacity="0.7"/>
  <!-- 텍스트 -->
  <text x="200" y="20" font-family="sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">콘크리트 숲의 미래</text>
  <text x="200" y="36" font-family="sans-serif" font-size="10" fill="#546e7a" text-anchor="middle">숲은 사라지고 회색빛 아파트만 남았습니다</text>
</svg>
