<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b2dfdb"/>
      <stop offset="100%" stop-color="#e0f2f1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 구름 -->
  <ellipse cx="100" cy="50" rx="45" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="135" cy="44" rx="32" ry="14" fill="white" opacity="0.85"/>
  <ellipse cx="310" cy="55" rx="38" ry="15" fill="white" opacity="0.7"/>
  <!-- 배경 나무들 -->
  <g>
    <rect x="18" y="155" width="8" height="60" fill="#6d4c41"/>
    <circle cx="22" cy="148" r="22" fill="#2e7d32"/>
    <circle cx="10" cy="158" r="16" fill="#388e3c"/>
    <circle cx="34" cy="158" r="16" fill="#1b5e20"/>
  </g>
  <g>
    <rect x="358" y="155" width="8" height="60" fill="#6d4c41"/>
    <circle cx="362" cy="148" r="22" fill="#2e7d32"/>
    <circle cx="350" cy="158" r="16" fill="#388e3c"/>
    <circle cx="374" cy="155" r="16" fill="#1b5e20"/>
  </g>
  <!-- 자전거 도로 (녹색 구분선) -->
  <rect x="0" y="215" width="400" height="55" fill="#e8f5e9"/>
  <rect x="0" y="215" width="400" height="4" fill="#4caf50"/>
  <rect x="0" y="265" width="400" height="4" fill="#4caf50"/>
  <!-- 자전거 아이콘들 -->
  <!-- 자전거1 -->
  <g transform="translate(80,238)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#1565c0" stroke-width="3"/>
    <circle cx="36" cy="0" r="14" fill="none" stroke="#1565c0" stroke-width="3"/>
    <polygon points="18,-16 0,0 36,0" fill="none" stroke="#1565c0" stroke-width="2.5"/>
    <circle cx="18" cy="-16" r="3" fill="#ef5350"/>
    <line x1="18" y1="-16" x2="18" y2="-24" stroke="#1565c0" stroke-width="2"/>
    <line x1="10" y1="-24" x2="26" y2="-24" stroke="#1565c0" stroke-width="2"/>
  </g>
  <!-- 자전거2 -->
  <g transform="translate(220,238)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#388e3c" stroke-width="3"/>
    <circle cx="36" cy="0" r="14" fill="none" stroke="#388e3c" stroke-width="3"/>
    <polygon points="18,-16 0,0 36,0" fill="none" stroke="#388e3c" stroke-width="2.5"/>
    <circle cx="18" cy="-16" r="3" fill="#ffd54f"/>
    <line x1="18" y1="-16" x2="18" y2="-24" stroke="#388e3c" stroke-width="2"/>
    <line x1="10" y1="-24" x2="26" y2="-24" stroke="#388e3c" stroke-width="2"/>
  </g>
  <!-- 전기버스 -->
  <rect x="120" y="165" width="130" height="48" rx="8" fill="#1976d2"/>
  <rect x="125" y="170" width="120" height="30" rx="4" fill="#1565c0"/>
  <!-- 버스 창문들 -->
  <rect x="130" y="173" width="22" height="20" rx="3" fill="#90caf9"/>
  <rect x="158" y="173" width="22" height="20" rx="3" fill="#90caf9"/>
  <rect x="186" y="173" width="22" height="20" rx="3" fill="#90caf9"/>
  <rect x="214" y="173" width="22" height="20" rx="3" fill="#90caf9"/>
  <!-- 버스 바퀴 -->
  <circle cx="148" cy="213" r="10" fill="#37474f"/>
  <circle cx="148" cy="213" r="5" fill="#78909c"/>
  <circle cx="222" cy="213" r="10" fill="#37474f"/>
  <circle cx="222" cy="213" r="5" fill="#78909c"/>
  <!-- 번개(전기) 마크 -->
  <text x="190" y="193" font-family="sans-serif" font-size="14" fill="#fff176" text-anchor="middle">⚡</text>
  <!-- 꽃과 나무 -->
  <circle cx="65" cy="213" r="6" fill="#f48fb1"/>
  <circle cx="80" cy="210" r="5" fill="#fff176"/>
  <circle cx="320" cy="213" r="6" fill="#ce93d8"/>
  <circle cx="335" cy="210" r="5" fill="#f48fb1"/>
  <!-- 텍스트 -->
  <text x="200" y="20" font-family="sans-serif" font-size="13" fill="#1b5e20" text-anchor="middle" font-weight="bold">전기버스와 자전거 도로</text>
  <text x="200" y="36" font-family="sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">조용하고 깨끗한 출퇴근 풍경</text>
</svg>
