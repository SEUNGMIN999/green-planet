<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 민둥산 (깎인 흔적) -->
  <polygon points="0,180 120,80 240,150 160,180" fill="#8d6e63"/>
  <polygon points="100,180 200,100 300,160 220,180" fill="#795548"/>
  <polygon points="0,180 80,120 140,160 60,180" fill="#a1887f"/>
  <!-- 도로 원근법 -->
  <polygon points="60,280 340,280 280,160 120,160" fill="#546e7a"/>
  <!-- 도로 차선 -->
  <polygon points="185,280 215,280 210,160 190,160" fill="#ffd54f" opacity="0.7"/>
  <polygon points="130,280 150,280 148,160 132,160" fill="white" opacity="0.4"/>
  <polygon points="250,280 270,280 268,160 252,160" fill="white" opacity="0.4"/>
  <!-- 가드레일 -->
  <line x1="60" y1="280" x2="120" y2="160" stroke="#90a4ae" stroke-width="3"/>
  <line x1="340" y1="280" x2="280" y2="160" stroke="#90a4ae" stroke-width="3"/>
  <!-- 자동차들 -->
  <rect x="155" y="240" width="32" height="16" rx="4" fill="#ef5350"/>
  <rect x="215" y="220" width="28" height="14" rx="4" fill="#42a5f5"/>
  <rect x="165" y="190" width="24" height="12" rx="3" fill="#ffca28"/>
  <rect x="205" y="175" width="22" height="11" rx="3" fill="#66bb6a"/>
  <!-- 차 앞유리 반사 -->
  <rect x="159" y="241" width="12" height="6" rx="1" fill="#90caf9" opacity="0.7"/>
  <rect x="219" y="221" width="10" height="5" rx="1" fill="#90caf9" opacity="0.7"/>
  <!-- 배기가스 -->
  <ellipse cx="155" cy="248" rx="10" ry="4" fill="#9e9e9e" opacity="0.4"/>
  <ellipse cx="148" cy="244" rx="12" ry="5" fill="#bdbdbd" opacity="0.3"/>
  <ellipse cx="215" cy="227" rx="8" ry="3" fill="#9e9e9e" opacity="0.4"/>
  <!-- 텍스트 -->
  <text x="200" y="20" font-family="sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">산을 깎아 만든 8차선 도로</text>
  <text x="200" y="36" font-family="sans-serif" font-size="10" fill="#546e7a" text-anchor="middle">빠르게 달리지만 자연은 사라졌습니다</text>
</svg>
