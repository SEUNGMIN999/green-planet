<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="60%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 태양 -->
  <circle cx="340" cy="55" r="38" fill="url(#sun)"/>
  <g stroke="#ffd54f" stroke-width="3" opacity="0.6">
    <line x1="340" y1="5" x2="340" y2="18"/>
    <line x1="340" y1="92" x2="340" y2="105"/>
    <line x1="290" y1="55" x2="303" y2="55"/>
    <line x1="377" y1="55" x2="390" y2="55"/>
    <line x1="305" y1="20" x2="314" y2="29"/>
    <line x1="366" y1="81" x2="375" y2="90"/>
    <line x1="375" y1="20" x2="366" y2="29"/>
    <line x1="305" y1="90" x2="314" y2="81"/>
  </g>
  <!-- 언덕 -->
  <ellipse cx="200" cy="260" rx="280" ry="90" fill="#c8e6c9"/>
  <ellipse cx="0" cy="260" rx="120" ry="70" fill="#a5d6a7"/>
  <ellipse cx="400" cy="260" rx="120" ry="70" fill="#a5d6a7"/>
  <!-- 태양광 패널 배열 -->
  <g fill="#1565c0" stroke="#0d47a1" stroke-width="0.5">
    <!-- 1열 -->
    <rect x="30" y="170" width="45" height="28" rx="2"/>
    <rect x="82" y="170" width="45" height="28" rx="2"/>
    <rect x="134" y="170" width="45" height="28" rx="2"/>
    <rect x="186" y="170" width="45" height="28" rx="2"/>
    <rect x="238" y="170" width="45" height="28" rx="2"/>
    <rect x="290" y="170" width="45" height="28" rx="2"/>
    <!-- 2열 -->
    <rect x="55" y="205" width="45" height="28" rx="2"/>
    <rect x="107" y="205" width="45" height="28" rx="2"/>
    <rect x="159" y="205" width="45" height="28" rx="2"/>
    <rect x="211" y="205" width="45" height="28" rx="2"/>
    <rect x="263" y="205" width="45" height="28" rx="2"/>
  </g>
  <!-- 패널 반사 빛 -->
  <g stroke="#90caf9" stroke-width="0.8" opacity="0.5">
    <line x1="30" y1="184" x2="75" y2="184"/>
    <line x1="52" y1="170" x2="52" y2="198"/>
    <line x1="82" y1="184" x2="127" y2="184"/>
    <line x1="104" y1="170" x2="104" y2="198"/>
  </g>
  <!-- 패널 지지대 -->
  <g stroke="#78909c" stroke-width="2">
    <line x1="52" y1="198" x2="52" y2="218"/>
    <line x1="104" y1="198" x2="104" y2="218"/>
    <line x1="156" y1="198" x2="156" y2="218"/>
    <line x1="208" y1="198" x2="208" y2="218"/>
    <line x1="260" y1="198" x2="260" y2="218"/>
    <line x1="312" y1="198" x2="312" y2="218"/>
  </g>
  <!-- 빛 반짝임 효과 -->
  <circle cx="52" cy="174" r="3" fill="#fff9c4" opacity="0.9"/>
  <circle cx="156" cy="174" r="3" fill="#fff9c4" opacity="0.9"/>
  <circle cx="260" cy="174" r="3" fill="#fff9c4" opacity="0.9"/>
  <!-- 텍스트 -->
  <text x="200" y="20" font-family="sans-serif" font-size="13" fill="#e65100" text-anchor="middle" font-weight="bold">태양이 마을을 밝히다</text>
  <text x="200" y="36" font-family="sans-serif" font-size="10" fill="#f57f17" text-anchor="middle">깨끗한 에너지로 빛나는 그린 마을</text>
</svg>
