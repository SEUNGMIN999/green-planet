<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- 재활용 센터 건물 -->
  <rect x="80" y="130" width="240" height="120" fill="#e0f2f1"/>
  <rect x="80" y="130" width="240" height="12" fill="#80cbc4"/>
  <!-- 지붕 -->
  <polygon points="60,130 200,80 340,130" fill="#4db6ac"/>
  <!-- 태양광 패널 (지붕) -->
  <rect x="140" y="95" width="120" height="25" fill="#1976d2" opacity="0.8"/>
  <line x1="200" y1="95" x2="200" y2="120" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="140" y1="107" x2="260" y2="107" stroke="#90caf9" stroke-width="1.5"/>
  <!-- 창문 -->
  <rect x="100" y="150" width="45" height="35" rx="3" fill="#80deea"/>
  <rect x="175" y="150" width="50" height="35" rx="3" fill="#80deea"/>
  <rect x="255" y="150" width="45" height="35" rx="3" fill="#80deea"/>
  <!-- 문 -->
  <rect x="175" y="200" width="50" height="50" rx="3" fill="#a5d6a7"/>
  <circle cx="221" cy="226" r="3" fill="#ffd54f"/>
  <!-- 분리수거 통 3개 -->
  <rect x="95" y="225" width="28" height="30" rx="3" fill="#ef5350"/>
  <text x="109" y="245" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">캔</text>
  <rect x="145" y="225" width="28" height="30" rx="3" fill="#42a5f5"/>
  <text x="159" y="245" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">종이</text>
  <rect x="195" y="225" width="28" height="30" rx="3" fill="#66bb6a"/>
  <text x="209" y="245" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">병</text>
  <!-- 재활용 화살표 심볼 (큰 것) -->
  <text x="310" y="185" font-family="sans-serif" font-size="52" fill="#4caf50" opacity="0.8" text-anchor="middle">♻</text>
  <!-- 잔디 -->
  <rect x="0" y="255" width="400" height="25" fill="#a5d6a7"/>
  <ellipse cx="60" cy="255" rx="50" ry="12" fill="#81c784"/>
  <ellipse cx="350" cy="255" rx="55" ry="12" fill="#81c784"/>
  <!-- 텍스트 -->
  <text x="200" y="20" font-family="sans-serif" font-size="13" fill="#004d40" text-anchor="middle" font-weight="bold">쓰레기가 자원으로 재탄생</text>
  <text x="200" y="36" font-family="sans-serif" font-size="10" fill="#00695c" text-anchor="middle">깨끗하게 순환하는 그린 마을</text>
</svg>
